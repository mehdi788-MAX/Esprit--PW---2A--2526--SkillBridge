<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Principale – SkillBridge</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS pour mise en page responsive -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #fdf6f0;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container-links {
      text-align: center;
      background-color: #fff8f0;
      padding: 50px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      color: #ff6600;
      margin-bottom: 40px;
      font-weight: 700;
    }

    .btn-link {
      display: block;
      width: 100%;
      padding: 15px 0;
      margin-bottom: 20px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-frontend {
      background-color: #ff8533;
    }

    .btn-frontend:hover {
      background-color: #ff6600;
    }

    .btn-backend {
      background-color: #4b5563;
    }

    .btn-backend:hover {
      background-color: #1a1a2e;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }

      .btn-link {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container-links">
    <h1>Bienvenue sur SkillBridge</h1>
    <a href="front-office/index.html" class="btn-link btn-frontend">Front Office</a>
    <a href="back-office/index.php" class="btn-link btn-backend">Back Office</a>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
